

image: mcr.microsoft.com/playwright:v1.54.2-noble

stages:
  - install
  - lint
  - unit_test
  - build
  - e2e

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
    - .npm/

variables:
  CI: "true"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

before_script:
  - npm ci

install:
  stage: install
  script:
    - npm ci

lint:
  stage: lint
  script:
    - npm run lint

unit_tests:
  stage: unit_test
  script:
    - npm run test

build:
  stage: build
  script:
    - npm run build

playwright:
  stage: e2e
  script:
    - npx playwright install --with-deps
    - npm run test:e2e
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days