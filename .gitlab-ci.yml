image: mcr.microsoft.com/playwright:v1.60.0-noble

default:
  tags:
    - macbook
    - docker
    - calcolafacile

workflow:
  rules:
    - if: '$CI_PROJECT_PATH == "neralab/calcolafacile"'
      when: always
    - when: never

stages:
  - lint
  - unit_test
  - build
  - e2e

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
    - .npm/

variables:
  CI: "true"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

before_script:
  - npm ci

lint:
  stage: lint
  script:
    - npm run lint

unit_tests:
  stage: unit_test
  script:
    - npm run test

build:
  stage: build
  script:
    - npm run build

playwright:
  stage: e2e
  script:
    - npm run test:e2e
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days